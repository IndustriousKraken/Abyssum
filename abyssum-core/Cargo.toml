[package]
name = "abyssum-core"
description = "Cross-cutting foundations for Abyssum: configuration, error model, logging."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
serde = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
# Async runtime: the rate limiter sleeps and locks per-domain state on Tokio.
tokio = { workspace = true }
# Fresh uniform draw for each paced request's base delay.
rand = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
# `test-util` unlocks the paused/virtual clock (`start_paused`) so the pacing
# tests are deterministic and instant — no real sleeping, no network.
tokio = { workspace = true, features = ["test-util"] }
